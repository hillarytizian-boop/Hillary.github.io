<!DOCTYPE html>
<html>
<head>
<title>Tizian Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>Tizian Social Media Dashboard</h1></header>
<div class="container">

<div class="card">
<h2>Create Post</h2>
<textarea id="text" placeholder="Write your post"></textarea>
<select id="platform">
<option>TikTok</option>
<option>WhatsApp</option>
</select>
<input type="datetime-local" id="time">
<button onclick="schedulePost()">Schedule</button>
<p id="status"></p>
</div>

<div class="card">
<h2>Scheduled Posts</h2>
<div id="posts"></div>
</div>

<div class="card">
<h2>AI Caption Generator</h2>
<input id="topic" placeholder="Topic">
<button onclick="caption()">Generate</button>
<p id="captionResult"></p>
</div>

<div class="card">
<h2>Audience Analytics</h2>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h2>Best Posting Time</h2>
<button onclick="bestTime()">Analyze</button>
<p id="best"></p>
</div>

<div class="card">
<h2>Admin Panel</h2>
<div id="adminPosts"></div>
</div>

<script src="script.js"></script>
</body>
</html>
